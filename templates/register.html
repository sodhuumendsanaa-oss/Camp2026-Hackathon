<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 - FreshGuard</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .auth-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: radial-gradient(circle at top right, rgba(34, 197, 94, 0.08), transparent 40%), var(--bg-primary);
    }
    .auth-card {
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 28px;
    }
    .auth-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .auth-link {
      color: var(--green-400);
      font-weight: 600;
      transition: var(--transition);
    }
    .auth-link:hover {
      color: var(--text-primary);
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="card auth-card fade-in">
    <div class="auth-logo">
      <span class="logo-icon">🥗</span>
      <span class="logo-text">FreshGuard</span>
    </div>
    
    <h2 class="auth-title">新規アカウント作成</h2>
    <p class="auth-subtitle">新鮮な暮らしの管理を始めましょう</p>
    
    <div id="alertBox" class="alert" style="display: none;"></div>
    
    <form id="registerForm">
      <div class="form-group">
        <label class="form-label" for="username">ユーザー名</label>
        <input class="form-control" id="username" name="username" type="text" placeholder="ユーザー名を入力" required autofocus maxlength="30">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">パスワード</label>
        <input class="form-control" id="password" name="password" type="password" placeholder="パスワードを入力" required minlength="4">
      </div>
      
      <div class="form-group" style="margin-bottom: 24px;">
        <label class="form-label" for="confirmPassword">パスワード確認</label>
        <input class="form-control" id="confirmPassword" name="confirmPassword" type="password" placeholder="もう一度パスワードを入力" required>
      </div>
      
      <button class="btn btn-primary btn-full pulse-glow" id="submitBtn" type="submit">
        <span>アカウントを登録する</span>
      </button>
    </form>
    
    <div class="auth-footer">
      すでにアカウントを持っていますか？ <a href="/login" class="auth-link">ログインはこちら</a>
    </div>
  </div>
</div>

<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    
    alertBox.style.display = 'none';
    alertBox.className = 'alert';
    
    // パスワード確認チェック
    if (passwordInput.value !== confirmPasswordInput.value) {
      alertBox.textContent = '❌ パスワードが一致しません。';
      alertBox.classList.add('alert-danger');
      alertBox.style.display = 'block';
      return;
    }
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span>アカウント作成中...</span>';
    
    try {
      const response = await fetch('/register', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          username: usernameInput.value,
          password: passwordInput.value
        })
      });
      
      const data = await response.json();
      
      if (response.ok) {
        // 登録成功
        alertBox.textContent = '✅ ' + (data.success || '登録が完了しました！ログイン画面へ移動します。');
        alertBox.classList.add('alert-success');
        alertBox.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = '/login';
        }, 2000);
      } else {
        // エラーの表示
        alertBox.textContent = '❌ ' + (data.error || '登録に失敗しました。');
        alertBox.classList.add('alert-danger');
        alertBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>アカウントを登録する</span>';
      }
    } catch (err) {
      alertBox.textContent = '❌ 通信エラーが発生しました。';
      alertBox.classList.add('alert-danger');
      alertBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<span>アカウントを登録する</span>';
    }
  });
</script>
</body>
</html>
